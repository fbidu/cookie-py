version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"

# Template files (template/**) use a .jinja suffix and contain jinja
# placeholders, so Dependabot cannot parse them. Pinned versions in the
# template's pre-commit config, workflows, and Dockerfile must be bumped
# by hand for now.
