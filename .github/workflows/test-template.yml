name: Test Copier Template

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-template:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14', '3.x']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install copier and prek
      run: |
        uv tool install copier
        uv tool install prek

    - name: Install dependencies
      run: uv sync --dev

    - name: Run integration tests
      run: uv run pytest tests/test_copier_integration.py -v

  test-docker:
    runs-on: ubuntu-latest
    name: Test Template with Docker

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build test Docker image
      run: docker build -t cookie-py-test .

    - name: Run template tests in Docker
      run: docker run --rm cookie-py-test

  prek:
    runs-on: ubuntu-latest
    name: Prek (lint, format, types, actionlint)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Install dependencies
      run: uv sync --dev

    - uses: actions/cache@v5
      with:
        path: ~/.cache/prek
        key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

    - name: prek (commit stage)
      run: uv run prek run --all-files --show-diff-on-failure --hook-stage pre-commit
