name: Test Copier Template

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-template:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install copier
      run: uv tool install copier

    - name: Install dependencies
      run: uv sync --dev

    - name: Run integration tests
      run: uv run pytest tests/test_copier_integration.py -v

  test-docker:
    runs-on: ubuntu-latest
    name: Test Template with Docker

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build test Docker image
      run: docker build -t cookie-py-test .

    - name: Run template tests in Docker
      run: docker run --rm cookie-py-test

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: uv sync --dev

    - name: Run ruff check
      run: uv run ruff check .

    - name: Run ruff format check
      run: uv run ruff format --check .

    - name: Run pyright type checking
      run: uv run pyright
