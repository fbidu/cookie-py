_min_copier_version: "9.1.0"
_subdirectory: template
_templates_suffix: .jinja

# Copier tasks (replacing cookiecutter hooks)
_tasks:
  - command: >-
      python {{ _copier_conf.src_path }}/tasks/post_generate.py
      --ci-provider {{ ci_provider }}
      {% if not enable_github_copilot %}--disable-copilot{% endif %}

# --- Project metadata ---

project_name:
  type: str
  help: "What is your project's name?"
  default: "{{ _copier_conf.dst_path.name }}"

directory_name:
  type: str
  help: "Directory name for the project"
  default: "{{ project_name | lower | replace(' ', '-') }}"

pkg_name:
  type: str
  help: "Python package name"
  default: "{{ directory_name | replace('-', '_') }}"

description:
  type: str
  help: "Short project description"
  default: "{{ project_name }} is awesome"

author:
  type: str
  help: "Author name and email"
  default: "Felipe 'Bidu' Rodrigues <felipe@felipevr.com>"

version:
  type: str
  help: "Initial version"
  default: "0.1.0"

license:
  type: str
  help: "License identifier"
  default: "MIT"

python_version:
  type: str
  help: "Minimum Python version"
  default: "3.12"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"

# --- Feature toggles ---

language:
  type: str
  help: "README language(s)"
  default: "EN"
  choices:
    "English": "EN"
    "Portuguese (PT-BR)": "PT-BR"
    "Both": "Both"

enable_github_copilot:
  type: bool
  help: "Enable GitHub Copilot in VS Code settings?"
  default: true

ci_provider:
  type: str
  help: "Which CI provider to set up?"
  default: "none"
  choices:
    "No CI": "none"
    "GitHub Actions": "github"
    "GitLab CI": "gitlab"

# --- Conditional file exclusion ---

_exclude:
  - "copier.yml"
  - "tasks/"
  - "__pycache__/"
  - "*.pyc"
  - "{% if ci_provider != 'github' %}.github/workflows/ci.yml{% endif %}"
  - "{% if ci_provider != 'github' %}.github/workflows/build.yml{% endif %}"
  - "{% if ci_provider != 'gitlab' %}.gitlab-ci.yml{% endif %}"
